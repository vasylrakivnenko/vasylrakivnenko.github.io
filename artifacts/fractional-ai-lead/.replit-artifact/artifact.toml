kind = "web"
previewPath = "/"
title = "Fractional AI Lead"
version = "1.0.0"
id = "artifacts/fractional-ai-lead"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23313

[services.development]
run = "pnpm --filter @workspace/fractional-ai-lead run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fractional-ai-lead", "run", "build" ]
publicDir = "artifacts/fractional-ai-lead/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23313"
BASE_PATH = "/"
